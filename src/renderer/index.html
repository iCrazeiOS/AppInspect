<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self'"
    />
    <title>Disect</title>
    <link rel="stylesheet" href="../../dist/renderer/index.css" />
  </head>
  <body>
    <!-- Drop zone overlay -->
    <div id="drop-overlay" class="drop-overlay hidden">
      <div class="drop-overlay-content">
        <div class="drop-icon">&#x1F4E5;</div>
        <div class="drop-text">Drop IPA file here</div>
      </div>
    </div>

    <div id="app">
      <!-- Sidebar -->
      <aside id="sidebar" class="sidebar">
        <div class="sidebar-header">
          <div class="app-title-row">
            <span class="app-title">Disect</span>
          </div>
          <button id="btn-open-ipa" class="btn-open-ipa">
            <span class="btn-icon">&#x1F4C2;</span>
            Open IPA
          </button>
          <!-- Binary selector (hidden until multiple binaries) -->
          <div id="binary-selector" class="binary-selector hidden">
            <label for="binary-dropdown" class="binary-label">Binary:</label>
            <select id="binary-dropdown" class="binary-dropdown"></select>
          </div>
        </div>
        <nav class="sidebar-nav">
          <button class="tab-btn active" data-tab="overview">
            <span class="tab-icon">&#x1F4CA;</span>
            <span class="tab-label">Overview</span>
            <button class="export-tab-btn hidden" data-export-tab="overview" title="Export Overview as JSON">&#x2B07;</button>
          </button>
          <button class="tab-btn" data-tab="strings">
            <span class="tab-icon">&#x1F524;</span>
            <span class="tab-label">Strings</span>
            <button class="export-tab-btn hidden" data-export-tab="strings" title="Export Strings as JSON">&#x2B07;</button>
          </button>
          <button class="tab-btn" data-tab="headers">
            <span class="tab-icon">&#x1F4D1;</span>
            <span class="tab-label">Headers</span>
            <button class="export-tab-btn hidden" data-export-tab="headers" title="Export Headers as JSON">&#x2B07;</button>
          </button>
          <button class="tab-btn" data-tab="libraries">
            <span class="tab-icon">&#x1F4DA;</span>
            <span class="tab-label">Libraries</span>
            <button class="export-tab-btn hidden" data-export-tab="libraries" title="Export Libraries as JSON">&#x2B07;</button>
          </button>
          <button class="tab-btn" data-tab="symbols">
            <span class="tab-icon">&#x1F523;</span>
            <span class="tab-label">Symbols</span>
            <button class="export-tab-btn hidden" data-export-tab="symbols" title="Export Symbols as JSON">&#x2B07;</button>
          </button>
          <button class="tab-btn" data-tab="classes">
            <span class="tab-icon">&#x1F3D7;</span>
            <span class="tab-label">Classes</span>
            <button class="export-tab-btn hidden" data-export-tab="classes" title="Export Classes as JSON">&#x2B07;</button>
          </button>
          <button class="tab-btn" data-tab="entitlements">
            <span class="tab-icon">&#x1F512;</span>
            <span class="tab-label">Entitlements</span>
            <button class="export-tab-btn hidden" data-export-tab="entitlements" title="Export Entitlements as JSON">&#x2B07;</button>
          </button>
          <button class="tab-btn" data-tab="infoplist">
            <span class="tab-icon">&#x2699;</span>
            <span class="tab-label">Info.plist</span>
            <button class="export-tab-btn hidden" data-export-tab="infoPlist" title="Export Info.plist as JSON">&#x2B07;</button>
          </button>
          <button class="tab-btn" data-tab="security">
            <span class="tab-icon">&#x1F6E1;</span>
            <span class="tab-label">Security</span>
            <button class="export-tab-btn hidden" data-export-tab="security" title="Export Security as JSON">&#x2B07;</button>
          </button>
          <button class="tab-btn" data-tab="files">
            <span class="tab-icon">&#x1F4C1;</span>
            <span class="tab-label">Files</span>
            <button class="export-tab-btn hidden" data-export-tab="files" title="Export Files as JSON">&#x2B07;</button>
          </button>
        </nav>
        <div class="sidebar-footer hidden" id="sidebar-footer">
          <button id="btn-export-all" class="btn-export-all">
            <span class="btn-icon">&#x1F4E4;</span>
            Export All
          </button>
        </div>
      </aside>

      <!-- Main content area -->
      <main id="main-content" class="main-content">
        <!-- Loading bar -->
        <div id="loading-bar" class="loading-bar hidden">
          <div class="loading-bar-track">
            <div class="loading-bar-fill"></div>
          </div>
          <div id="loading-text" class="loading-text">Extracting IPA...</div>
        </div>

        <!-- Empty state -->
        <div id="empty-state" class="empty-state">
          <div class="empty-icon">&#x1F50D;</div>
          <p class="empty-text">Open or drop an IPA file to begin analysis</p>
          <button id="btn-open-ipa-empty" class="btn-open-ipa-alt">
            <span class="btn-icon">&#x1F4C2;</span>
            Open IPA File
          </button>
        </div>

        <!-- Tab content panels -->
        <div id="tab-content" class="tab-content hidden">
          <div id="tab-overview" class="tab-panel"></div>
          <div id="tab-strings" class="tab-panel hidden"></div>
          <div id="tab-headers" class="tab-panel hidden"></div>
          <div id="tab-libraries" class="tab-panel hidden"></div>
          <div id="tab-symbols" class="tab-panel hidden"></div>
          <div id="tab-classes" class="tab-panel hidden"></div>
          <div id="tab-entitlements" class="tab-panel hidden"></div>
          <div id="tab-infoplist" class="tab-panel hidden"></div>
          <div id="tab-security" class="tab-panel hidden"></div>
          <div id="tab-files" class="tab-panel hidden"></div>
        </div>
      </main>
    </div>

    <script src="../../dist/renderer/index.js"></script>
  </body>
</html>
